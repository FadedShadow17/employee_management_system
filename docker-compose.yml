version: '3.8'

services:
  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ems-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-securepassword123}
      MONGO_INITDB_DATABASE: ems
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - ems-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-securepassword123}@mongodb:27017/ems?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-strong-secret}
      JWT_EXPIRES_IN: 15m
      CLIENT_URL: http://localhost:3000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-generate-a-64-char-hex-key-here}
    ports:
      - "5000:5000"
    networks:
      - ems-network
    # Read-only filesystem with specific write dirs
    read_only: true
    tmpfs:
      - /tmp
    # Security: limit resources
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ems-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - ems-network
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  mongodb_data:
    driver: local

networks:
  ems-network:
    driver: bridge
